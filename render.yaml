services:
  - type: web
    name: voibixai-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Set these in Render dashboard — do NOT commit real values here
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RETELL_API_KEY
        sync: false
      - key: RETELL_LLM_ID
        sync: false
      - key: RETELL_AGENT_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_KEY_FILE
        sync: false
      # CRITICAL: Set this to your Render service URL after first deploy
      # e.g. https://voibixai-api.onrender.com
      # Then sync all firm agents so tool URLs get registered with Retell
      - key: WEBHOOK_BASE_URL
        sync: false
      # Your Vercel frontend URL — required for CORS
      # e.g. https://voibixai.vercel.app
      - key: FRONTEND_URL
        sync: false
      - key: LOG_LEVEL
        value: info
